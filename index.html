<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Moving Square Ball Launcher</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="wrap">
    <div class="title">3D Moving Square Ball Launcher (Three.js)</div>
    <div class="canvas-shell" id="container">
      <canvas id="c" aria-label="3D launcher canvas"></canvas>
      <div class="stats" id="info">balls: 0 | points: 0</div>
      <div class="controls">
        <label>
          <span>vel x</span>
          <input id="velX" type="range" min="0" max="10" step="0.1" value="5" />
          <span id="velXVal">5.0</span>
        </label>
        <label>
          <span>aim theta</span>
          <input id="aimTheta" type="range" min="-45" max="45" step="0.1" value="0" />
          <span id="aimThetaVal">0°</span>
        </label>
        <label>
          <span>theta up</span>
          <input id="aimPhi" type="range" min="50" max="90" step="0.1" value="80" />
          <span id="aimPhiVal">45.0°</span>
        </label>
        <label>
          <span>v</span>
          <input id="aimV" type="range" min="0" max="40" step="0.1" value="29.5" />
          <span id="aimVVal">13.4</span>
        </label>
        <label class="switch-row">
          <span>auto shoot @ 0</span>
          <input id="autoShoot" type="checkbox" role="switch" aria-label="Auto shoot when robot reaches origin" />
          <span id="autoShootVal">off</span>
        </label>
      </div>
      <div class="hud">
        <button id="btnLaunch" type="button">Launch ball</button>
        <button id="btnReset" type="button">Reset</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="camera-controls.js"></script>
  <script src="app.js"></script>
</body>
</html>
